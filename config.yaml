# DeerFlow Configuration for Empire
# Uses Anthropic Claude as the LLM provider

models:
  - name: claude-sonnet
    display_name: Claude Sonnet
    use: langchain_anthropic:ChatAnthropic
    model: claude-sonnet-4-6
    api_key: $ANTHROPIC_API_KEY
    max_tokens: 8192
    supports_vision: true
    when_thinking_enabled:
      thinking:
        type: enabled

tools:
  - name: web_search
    group: web
    use: src.community.brave.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: src.community.jina_ai.tools:web_fetch_tool
    timeout: 10

sandbox:
  use: src.sandbox.local:LocalSandboxProvider
